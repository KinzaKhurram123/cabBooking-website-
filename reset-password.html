<!doctype html>
<html lang="en">
  <head>
    <title>Reset Password - RideLynk</title>
    <link rel="icon" href="images/icc.png" type="image/gif" sizes="16x16" />
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="RideLynk - Reset Your Password" name="description" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 20px;
      }

      /* Animated Gradient Background */
      .animated-gradient {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          135deg,
          #44bfd2,
          #6cd4e8,
          #2e8b9e,
          #44bfd2,
          #6cd4e8
        );
        background-size: 400% 400%;
        animation: gradientShift 20s ease infinite;
        z-index: -2;
      }

      @keyframes gradientShift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: -1;
      }

      .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 500px;
        width: 100%;
        padding: 50px 40px;
        animation: slideUp 0.5s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo img {
        max-width: 180px;
        height: auto;
      }

      .form-title {
        font-size: 2rem;
        color: #333;
        text-align: center;
        margin-bottom: 10px;
      }

      .form-subtitle {
        color: #666;
        text-align: center;
        margin-bottom: 30px;
        font-size: 0.95rem;
      }

      .form-group {
        margin-bottom: 25px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
        font-size: 0.95rem;
      }

      .form-group input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: #f8f9fa;
      }

      .form-group input:focus {
        outline: none;
        border-color: #44bfd2;
        background: white;
        box-shadow: 0 0 0 3px rgba(68, 191, 210, 0.1);
      }

      .password-strength {
        margin-top: 8px;
        font-size: 0.85rem;
        display: none;
      }

      .password-strength.show {
        display: block;
      }

      .strength-bar {
        height: 4px;
        background: #e0e0e0;
        border-radius: 2px;
        margin-bottom: 5px;
        overflow: hidden;
      }

      .strength-fill {
        height: 100%;
        width: 0%;
        transition: all 0.3s ease;
        border-radius: 2px;
      }

      .strength-weak { width: 33%; background: #f44336; }
      .strength-fair { width: 66%; background: #ff9800; }
      .strength-good { width: 100%; background: #4caf50; }

      .btn-submit {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #44bfd2 0%, #6cd4e8 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(68, 191, 210, 0.3);
      }

      .btn-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .error-message,
      .success-message {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 0.9rem;
        display: none;
      }

      .error-message {
        background: #fee;
        color: #c33;
        border: 1px solid #fcc;
      }

      .success-message {
        background: rgba(76, 175, 80, 0.2);
        color: #4caf50;
        border: 2px solid #4caf50;
        font-weight: 600;
      }

      .back-link {
        text-align: center;
        margin-top: 25px;
        color: #666;
        font-size: 0.95rem;
      }

      .back-link a {
        color: #44bfd2;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s ease;
      }

      .back-link a:hover {
        color: #2e8b9e;
        text-decoration: underline;
      }

      .info-box {
        background: #f0f4ff;
        border-left: 4px solid #44bfd2;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 25px;
        font-size: 0.9rem;
        color: #555;
      }

      .otp-input {
        text-align: center;
        letter-spacing: 10px;
        font-size: 1.5rem;
        font-weight: 600;
      }

      @media (max-width: 768px) {
        .container {
          padding: 40px 30px;
        }

        .form-title {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="animated-gradient"></div>
    <div class="overlay"></div>

    <div class="container">
      <div style="text-align: left; margin-bottom: 15px;">
        <a href="index.html" style="color: #44bfd2; text-decoration: none; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 5px; transition: all 0.3s ease;">
          <span style="font-size: 1.2rem;">←</span> Back to Home
        </a>
      </div>

      <div class="logo">
        <img src="images/loogo.png" alt="RideLynk Logo">
      </div>

      <h2 class="form-title">Reset Password</h2>
      <p class="form-subtitle">Enter the code sent to your email and create a new password</p>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <div class="info-box">
        Check your email for the 6-digit verification code.
      </div>

      <form id="resetPasswordForm">
        <div class="form-group">
          <label for="otp">Verification Code</label>
          <input
            type="text"
            id="otp"
            name="otp"
            class="otp-input"
            placeholder="000000"
            maxlength="6"
            pattern="[0-9]{6}"
            required
            autocomplete="off"
          >
        </div>

        <div class="form-group">
          <label for="password">New Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter new password"
            minlength="8"
            required
          >
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span id="strengthText"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm new password"
            minlength="8"
            required
          >
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          Reset Password
        </button>

        <div class="back-link">
          <a href="forgot-password.html">Resend Code</a> | <a href="login.html">Back to Login</a>
        </div>
      </form>
    </div>

    <!-- Service Layer Scripts -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/auth-service.js"></script>

    <script>
      const form = document.getElementById('resetPasswordForm');
      const submitBtn = document.getElementById('submitBtn');
      const errorMessage = document.getElementById('errorMessage');
      const successMessage = document.getElementById('successMessage');
      const passwordInput = document.getElementById('password');
      const passwordStrength = document.getElementById('passwordStrength');
      const strengthFill = document.getElementById('strengthFill');
      const strengthText = document.getElementById('strengthText');

      // Get email from session storage
      const email = sessionStorage.getItem('resetEmail');

      // Redirect if no email found
      if (!email) {
        window.location.href = 'forgot-password.html';
      }

      // Password strength indicator
      passwordInput.addEventListener('input', () => {
        const password = passwordInput.value;

        if (password.length > 0) {
          passwordStrength.classList.add('show');
          const validation = Utils.validatePassword(password);
          const strength = Utils.getPasswordStrength(password);

          strengthFill.className = 'strength-fill';
          if (validation.strength <= 2) {
            strengthFill.classList.add('strength-weak');
          } else if (validation.strength <= 3) {
            strengthFill.classList.add('strength-fair');
          } else {
            strengthFill.classList.add('strength-good');
          }

          strengthText.textContent = `Password strength: ${strength}`;
        } else {
          passwordStrength.classList.remove('show');
        }
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Hide previous messages
        errorMessage.style.display = 'none';
        successMessage.style.display = 'none';

        // Get form data
        const otp = document.getElementById('otp').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Validate OTP
        if (otp.length !== 6 || !/^\d{6}$/.test(otp)) {
          errorMessage.textContent = 'Please enter a valid 6-digit code';
          errorMessage.style.display = 'block';
          return;
        }

        // Validate passwords match
        if (password !== confirmPassword) {
          errorMessage.textContent = 'Passwords do not match';
          errorMessage.style.display = 'block';
          return;
        }

        // Validate password strength
        const validation = Utils.validatePassword(password);
        if (!validation.isValid) {
          errorMessage.textContent = 'Password must be at least 8 characters with uppercase, lowercase, and numbers';
          errorMessage.style.display = 'block';
          return;
        }

        // Disable submit button
        submitBtn.disabled = true;
        submitBtn.textContent = 'Resetting Password...';

        try {
          // First verify OTP
          const otpResponse = await AuthService.verifyOTP(email, otp);

          if (otpResponse.success === false) {
            throw new Error(otpResponse.message || 'Invalid verification code');
          }

          // Then reset password
          const resetResponse = await AuthService.resetPassword(email, password, confirmPassword);

          // Check if reset was successful
          if (resetResponse.success !== false) {
            // Show success message
            successMessage.textContent = 'Password reset successful! Redirecting to login...';
            successMessage.style.display = 'block';

            // Clear session storage
            sessionStorage.removeItem('resetEmail');

            // Redirect to login page after 2 seconds
            setTimeout(() => {
              window.location.href = 'login.html';
            }, 2000);
          } else {
            // Reset failed
            errorMessage.textContent = resetResponse.message || 'Failed to reset password. Please try again.';
            errorMessage.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Reset Password';
          }
        } catch (error) {
          console.error('Reset password error:', error);
          console.log('Error details:', error);
          console.log('Error response:', error.response);

          // Display error message
          let errorMsg = 'An error occurred. Please try again.';

          // Check for specific error messages from API
          if (error.response?.data?.message) {
            errorMsg = error.response.data.message;
          } else if (error.message) {
            errorMsg = error.message;
          } else if (error.error === 'NETWORK_ERROR') {
            errorMsg = 'Network error. Please check your connection and try again.';
          }

          // Handle common error scenarios
          if (errorMsg.toLowerCase().includes('invalid') &&
              (errorMsg.toLowerCase().includes('code') ||
               errorMsg.toLowerCase().includes('otp') ||
               errorMsg.toLowerCase().includes('verification'))) {
            errorMsg = 'Invalid or expired verification code. Please request a new code.';
          } else if (errorMsg.toLowerCase().includes('expired')) {
            errorMsg = 'Verification code has expired. Please request a new code.';
          } else if (errorMsg.toLowerCase().includes('user not found') ||
                     errorMsg.toLowerCase().includes('email not found')) {
            errorMsg = 'Account not found. Please start the password reset process again.';
          } else if (errorMsg.toLowerCase().includes('password') &&
                     (errorMsg.toLowerCase().includes('weak') ||
                      errorMsg.toLowerCase().includes('short') ||
                      errorMsg.toLowerCase().includes('invalid'))) {
            errorMsg = 'Password is too weak. Use at least 8 characters with uppercase, lowercase, and numbers.';
          } else if (errorMsg.toLowerCase().includes('too many') ||
                     errorMsg.toLowerCase().includes('rate limit')) {
            errorMsg = 'Too many attempts. Please try again after a few minutes.';
          }

          errorMessage.textContent = errorMsg;
          errorMessage.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset Password';
        }
      });
    </script>
  </body>
</html>
