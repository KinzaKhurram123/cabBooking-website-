<!doctype html>
<html lang="en">
  <head>
    <title>Forgot Password - RideLynk</title>
    <link rel="icon" href="images/icc.png" type="image/gif" sizes="16x16" />
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="RideLynk - Reset Your Password" name="description" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 500px;
        width: 100%;
        padding: 50px 40px;
        animation: slideUp 0.5s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo img {
        max-width: 180px;
        height: auto;
      }

      .form-title {
        font-size: 2rem;
        color: #333;
        text-align: center;
        margin-bottom: 10px;
      }

      .form-subtitle {
        color: #666;
        text-align: center;
        margin-bottom: 30px;
        font-size: 0.95rem;
      }

      .form-group {
        margin-bottom: 25px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
        font-size: 0.95rem;
      }

      .form-group input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: #f8f9fa;
      }

      .form-group input:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .btn-submit {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
      }

      .btn-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .error-message,
      .success-message {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 0.9rem;
        display: none;
      }

      .error-message {
        background: #fee;
        color: #c33;
        border: 1px solid #fcc;
      }

      .success-message {
        background: rgba(76, 175, 80, 0.2);
        color: #4caf50;
        border: 2px solid #4caf50;
        font-weight: 600;
      }

      .back-link {
        text-align: center;
        margin-top: 25px;
        color: #666;
        font-size: 0.95rem;
      }

      .back-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s ease;
      }

      .back-link a:hover {
        color: #764ba2;
        text-decoration: underline;
      }

      .info-box {
        background: #f0f4ff;
        border-left: 4px solid #667eea;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 25px;
        font-size: 0.9rem;
        color: #555;
      }

      @media (max-width: 768px) {
        .container {
          padding: 40px 30px;
        }

        .form-title {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div style="text-align: left; margin-bottom: 15px;">
        <a href="index.html" style="color: #667eea; text-decoration: none; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 5px; transition: all 0.3s ease;">
          <span style="font-size: 1.2rem;">←</span> Back to Home
        </a>
      </div>

      <div class="logo">
        <img src="images/loogo.png" alt="RideLynk Logo">
      </div>

      <h2 class="form-title">Forgot Password?</h2>
      <p class="form-subtitle">Enter your email to receive a password reset code</p>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <div class="info-box">
        We'll send you a 6-digit verification code to reset your password.
      </div>

      <form id="forgotPasswordForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your registered email"
            required
            autocomplete="email"
          >
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          Send Reset Code
        </button>

        <div class="back-link">
          Remember your password? <a href="login.html">Back to Login</a>
        </div>
      </form>
    </div>

    <!-- Service Layer Scripts -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/auth-service.js"></script>

    <script>
      const form = document.getElementById('forgotPasswordForm');
      const submitBtn = document.getElementById('submitBtn');
      const errorMessage = document.getElementById('errorMessage');
      const successMessage = document.getElementById('successMessage');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Hide previous messages
        errorMessage.style.display = 'none';
        successMessage.style.display = 'none';

        // Get email
        const email = document.getElementById('email').value.trim();

        // Validate email
        if (!Utils.validateEmail(email)) {
          errorMessage.textContent = 'Please enter a valid email address';
          errorMessage.style.display = 'block';
          return;
        }

        // Disable submit button
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending Code...';

        try {
          // Call forgot password API
          const response = await AuthService.forgotPassword(email);

          // Check if request was successful
          if (response.success !== false) {
            // Show success message
            successMessage.textContent = response.message || 'Reset code sent to your email!';
            successMessage.style.display = 'block';

            // Store email for next step
            sessionStorage.setItem('resetEmail', email);

            // Redirect to reset password page after 2 seconds
            setTimeout(() => {
              window.location.href = 'reset-password.html';
            }, 2000);
          } else {
            // Request failed
            errorMessage.textContent = response.message || 'Failed to send reset code. Please try again.';
            errorMessage.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Send Reset Code';
          }
        } catch (error) {
          console.error('Forgot password error:', error);
          console.log('Error details:', error);
          console.log('Error response:', error.response);

          // Display error message
          let errorMsg = 'An error occurred. Please try again.';

          // Check for specific error messages from API
          if (error.response?.data?.message) {
            errorMsg = error.response.data.message;
          } else if (error.message) {
            errorMsg = error.message;
          } else if (error.error === 'NETWORK_ERROR') {
            errorMsg = 'Network error. Please check your connection and try again.';
          }

          // Handle common error scenarios
          if (errorMsg.toLowerCase().includes('user not found') ||
              errorMsg.toLowerCase().includes('email not found') ||
              errorMsg.toLowerCase().includes('not registered') ||
              errorMsg.toLowerCase().includes('does not exist')) {
            errorMsg = 'This email is not registered. Please check your email or sign up.';
          } else if (errorMsg.toLowerCase().includes('invalid email')) {
            errorMsg = 'Invalid email format. Please enter a valid email address.';
          } else if (errorMsg.toLowerCase().includes('too many requests') ||
                     errorMsg.toLowerCase().includes('rate limit')) {
            errorMsg = 'Too many attempts. Please try again after a few minutes.';
          }

          errorMessage.textContent = errorMsg;
          errorMessage.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send Reset Code';
        }
      });
    </script>
  </body>
</html>
