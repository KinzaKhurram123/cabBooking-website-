<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ride History - Admin - RideLynk</title>
    <link rel="icon" href="images/icc.png" type="image/gif" sizes="16x16" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Inter", sans-serif;
        background: #000000;
        color: #e5e7eb;
      }

      .header {
        background: linear-gradient(135deg, #000000 0%, #0a0a0a 100%);
        padding: 20px;
        border-bottom: 1px solid rgba(0, 173, 239, 0.2);
        box-shadow: 0 2px 10px rgba(0, 173, 239, 0.1);
      }

      .header-content {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        color: #00ADEF;
        font-size: 1.8rem;
      }

      .back-btn {
        background: rgba(0, 173, 239, 0.2);
        border: 1px solid rgba(0, 173, 239, 0.3);
        padding: 10px 20px;
        border-radius: 8px;
        color: #00ADEF;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .back-btn:hover {
        background: rgba(0, 173, 239, 0.3);
        box-shadow: 0 0 15px rgba(0, 173, 239, 0.3);
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 30px 20px;
      }

      .filters {
        background: #0a0a0a;
        padding: 20px;
        border-radius: 15px;
        border: 1px solid rgba(0, 173, 239, 0.2);
        margin-bottom: 20px;
      }

      .filter-row {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        align-items: center;
      }

      .date-filter {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .date-input {
        padding: 10px 15px;
        border: 2px solid rgba(0, 173, 239, 0.3);
        border-radius: 8px;
        background: #000000;
        color: #e5e7eb;
        font-size: 0.9rem;
      }

      .date-input:focus {
        outline: none;
        border-color: #00ADEF;
      }

      .filter-btn {
        padding: 10px 20px;
        border: 2px solid rgba(0, 173, 239, 0.3);
        border-radius: 25px;
        background: transparent;
        color: #9ca3af;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .filter-btn:hover {
        border-color: #00ADEF;
        color: #00ADEF;
        background: rgba(0, 173, 239, 0.1);
      }

      .filter-btn.active {
        border-color: #00ADEF;
        background: #00ADEF;
        color: #000000;
      }

      .history-table {
        background: #0a0a0a;
        border-radius: 15px;
        border: 1px solid rgba(0, 173, 239, 0.2);
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead {
        background: rgba(0, 173, 239, 0.1);
      }

      th {
        padding: 15px;
        text-align: left;
        font-weight: 600;
        color: #00ADEF;
        font-size: 0.9rem;
      }

      td {
        padding: 15px;
        border-top: 1px solid rgba(0, 173, 239, 0.1);
        color: #9ca3af;
      }

      tbody tr {
        transition: all 0.3s ease;
        cursor: pointer;
      }

      tbody tr:hover {
        background: rgba(0, 173, 239, 0.05);
      }

      .status-badge {
        padding: 6px 12px;
        border-radius: 15px;
        font-weight: 600;
        font-size: 0.85rem;
        display: inline-block;
      }

      .status-completed {
        background: rgba(16, 185, 129, 0.2);
        color: #10b981;
        border: 1px solid #10b981;
      }

      .status-cancelled {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
        border: 1px solid #ef4444;
      }

      .loading {
        text-align: center;
        padding: 60px 20px;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(0, 173, 239, 0.2);
        border-top: 4px solid #00ADEF;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        background: #0a0a0a;
        border-radius: 15px;
        border: 1px solid rgba(0, 173, 239, 0.2);
      }

      .empty-icon {
        font-size: 4rem;
        margin-bottom: 20px;
      }

      @media (max-width: 768px) {
        .history-table {
          overflow-x: auto;
        }

        table {
          min-width: 800px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-content">
        <h1>📜 Ride History</h1>
        <button class="back-btn" onclick="window.location.href='admin-dashboard.html'">← Back to Dashboard</button>
      </div>
    </div>

    <div class="container">
      <div id="loadingState" class="loading">
        <div class="spinner"></div>
        <p style="color: #9ca3af;">Loading ride history...</p>
      </div>

      <div id="contentArea" style="display: none;">
        <!-- Filters -->
        <div class="filters">
          <div class="filter-row">
            <button class="filter-btn active" data-status="all">All</button>
            <button class="filter-btn" data-status="completed">Completed</button>
            <button class="filter-btn" data-status="cancelled">Cancelled</button>

            <div class="date-filter" style="margin-left: auto;">
              <label style="color: #9ca3af;">From:</label>
              <input type="date" class="date-input" id="dateFrom" />
              <label style="color: #9ca3af;">To:</label>
              <input type="date" class="date-input" id="dateTo" />
            </div>
          </div>
        </div>

        <!-- History Table -->
        <div class="history-table">
          <table>
            <thead>
              <tr>
                <th>Booking ID</th>
                <th>User</th>
                <th>Driver</th>
                <th>Route</th>
                <th>Fare</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="historyTableBody">
              <!-- History will be inserted here -->
            </tbody>
          </table>
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
          <div class="empty-icon">📭</div>
          <h2 style="color: #00ADEF;">No History Found</h2>
          <p style="color: #9ca3af; margin-top: 10px;">No completed or cancelled rides in this date range</p>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/ride-service.js"></script>

    <script>
      let allHistory = [];
      let filteredHistory = [];
      let currentFilter = 'all';

      window.addEventListener('DOMContentLoaded', async () => {
        const token = localStorage.getItem(CONFIG.STORAGE_KEYS.AUTH_TOKEN);
        const role = localStorage.getItem(CONFIG.STORAGE_KEYS.USER_ROLE);

        if (!token || role !== 'admin') {
          window.location.href = 'login.html';
          return;
        }

        await loadHistory();
        setupFilters();
        setupDateFilters();
      });

      async function loadHistory() {
        try {
          const response = await RideService.getAllRides();

          if (response.success !== false && response.rides) {
            allHistory = response.rides.filter(r =>
              r.status === 'completed' || r.status === 'cancelled'
            );
            filteredHistory = allHistory;
            displayHistory();

            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('contentArea').style.display = 'block';
          }
        } catch (error) {
          console.error('Error loading history:', error);
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('contentArea').style.display = 'block';
          document.getElementById('emptyState').style.display = 'block';
        }
      }

      function setupFilters() {
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
          btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.status;
            applyFilters();
          });
        });
      }

      function setupDateFilters() {
        const dateFrom = document.getElementById('dateFrom');
        const dateTo = document.getElementById('dateTo');

        dateFrom.addEventListener('change', applyFilters);
        dateTo.addEventListener('change', applyFilters);
      }

      function applyFilters() {
        let filtered = allHistory;

        if (currentFilter !== 'all') {
          filtered = filtered.filter(r => r.status === currentFilter);
        }

        const dateFrom = document.getElementById('dateFrom').value;
        const dateTo = document.getElementById('dateTo').value;

        if (dateFrom) {
          filtered = filtered.filter(r =>
            new Date(r.createdAt) >= new Date(dateFrom)
          );
        }

        if (dateTo) {
          filtered = filtered.filter(r =>
            new Date(r.createdAt) <= new Date(dateTo + 'T23:59:59')
          );
        }

        filteredHistory = filtered;
        displayHistory();
      }

      function displayHistory() {
        const tbody = document.getElementById('historyTableBody');
        const emptyState = document.getElementById('emptyState');
        const table = document.querySelector('.history-table');

        if (filteredHistory.length === 0) {
          table.style.display = 'none';
          emptyState.style.display = 'block';
          return;
        }

        table.style.display = 'block';
        emptyState.style.display = 'none';

        tbody.innerHTML = filteredHistory.map(ride => `
          <tr onclick="viewRideDetails('${ride._id}')">
            <td><strong style="color: #00ADEF;">#${ride._id.slice(-8).toUpperCase()}</strong></td>
            <td>${ride.user?.name || 'N/A'}</td>
            <td>${ride.driver?.name || 'N/A'}</td>
            <td>${truncate(ride.pickupLocationName || 'N/A', 25)} → ${truncate(ride.dropoffLocationName || 'N/A', 25)}</td>
            <td><strong style="color: #00ADEF;">$${(ride.fare || 0).toFixed(2)}</strong></td>
            <td><span class="status-badge status-${ride.status}">${ride.status === 'completed' ? 'Completed' : 'Cancelled'}</span></td>
            <td>${new Date(ride.createdAt).toLocaleDateString()}</td>
          </tr>
        `).join('');
      }

      function viewRideDetails(rideId) {
        alert('Ride details page coming soon!\nBooking ID: ' + rideId);
      }

      function truncate(str, length) {
        return str.length > length ? str.substring(0, length) + '...' : str;
      }
    </script>
  </body>
</html>
