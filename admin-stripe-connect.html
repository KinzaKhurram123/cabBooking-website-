<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stripe Connect Management - RideLynk Admin</title>
    <link rel="icon" href="images/icc.png" type="image/gif" sizes="16x16" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Inter", sans-serif;
        background: #0a0a0a;
        color: #e5e7eb;
        min-height: 100vh;
      }

      .animated-gradient {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #44bfd2, #6cd4e8, #2e8b9e, #44bfd2, #6cd4e8);
        background-size: 400% 400%;
        animation: gradientShift 20s ease infinite;
        z-index: -2;
      }

      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: -1;
      }

      .header {
        background: rgba(0, 0, 0, 0.3);
        padding: 20px;
        border-bottom: 1px solid rgba(68, 191, 210, 0.2);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-content {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        color: #6cd4e8;
        font-size: 1.8rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .back-btn {
        background: rgba(68, 191, 210, 0.2);
        border: 1px solid rgba(68, 191, 210, 0.3);
        padding: 10px 20px;
        border-radius: 8px;
        color: #6cd4e8;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .back-btn:hover {
        background: rgba(68, 191, 210, 0.3);
        box-shadow: 0 0 15px rgba(68, 191, 210, 0.3);
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 30px 20px;
        background: white;
        min-height: 100vh;
      }

      /* Stats Cards */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .stat-card {
        background: #0a0a0a;
        padding: 25px;
        border-radius: 15px;
        border: 1px solid rgba(68, 191, 210, 0.2);
      }

      .stat-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      .stat-icon {
        width: 50px;
        height: 50px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }

      .icon-total {
        background: rgba(68, 191, 210, 0.2);
        color: #6cd4e8;
      }

      .icon-active {
        background: rgba(16, 185, 129, 0.2);
        color: #10b981;
      }

      .icon-pending {
        background: rgba(245, 158, 11, 0.2);
        color: #f59e0b;
      }

      .icon-disabled {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
      }

      .stat-value {
        font-size: 2rem;
        font-weight: 700;
        color: #6cd4e8;
        margin-bottom: 5px;
      }

      .stat-label {
        color: #9ca3af;
        font-size: 0.9rem;
      }

      /* Filters */
      .filters-section {
        background: #0a0a0a;
        padding: 20px;
        border-radius: 15px;
        border: 1px solid rgba(68, 191, 210, 0.2);
        margin-bottom: 20px;
        display: flex;
        gap: 15px;
        align-items: center;
        flex-wrap: wrap;
      }

      .filter-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .filter-label {
        color: #9ca3af;
        font-weight: 600;
        font-size: 0.9rem;
      }

      .filter-select {
        background: rgba(68, 191, 210, 0.1);
        border: 1px solid rgba(68, 191, 210, 0.3);
        color: #e5e7eb;
        padding: 8px 15px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }

      .search-box {
        flex: 1;
        min-width: 250px;
        position: relative;
      }

      .search-input {
        width: 100%;
        background: rgba(68, 191, 210, 0.1);
        border: 1px solid rgba(68, 191, 210, 0.3);
        color: #e5e7eb;
        padding: 10px 15px 10px 40px;
        border-radius: 8px;
        font-size: 0.95rem;
      }

      .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #6cd4e8;
      }

      /* Table */
      .table-container {
        background: #0a0a0a;
        border-radius: 15px;
        border: 1px solid rgba(68, 191, 210, 0.2);
        overflow: hidden;
      }

      .table-header {
        padding: 20px;
        border-bottom: 1px solid rgba(68, 191, 210, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .table-title {
        color: #6cd4e8;
        font-size: 1.2rem;
        font-weight: 700;
      }

      .refresh-btn {
        background: rgba(68, 191, 210, 0.2);
        border: 1px solid rgba(68, 191, 210, 0.3);
        color: #6cd4e8;
        padding: 8px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .refresh-btn:hover {
        background: rgba(68, 191, 210, 0.3);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead {
        background: rgba(68, 191, 210, 0.1);
      }

      th {
        padding: 15px;
        text-align: left;
        color: #6cd4e8;
        font-weight: 700;
        font-size: 0.9rem;
        text-transform: uppercase;
      }

      td {
        padding: 15px;
        border-top: 1px solid rgba(68, 191, 210, 0.1);
        color: #e5e7eb;
      }

      tbody tr {
        transition: all 0.3s ease;
      }

      tbody tr:hover {
        background: rgba(68, 191, 210, 0.05);
      }

      .driver-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .driver-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(68, 191, 210, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6cd4e8;
        font-weight: 700;
      }

      .driver-details {
        flex: 1;
      }

      .driver-name {
        font-weight: 600;
        color: #e5e7eb;
        margin-bottom: 2px;
      }

      .driver-email {
        font-size: 0.85rem;
        color: #9ca3af;
      }

      .status-badge {
        padding: 6px 12px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }

      .status-enabled {
        background: rgba(16, 185, 129, 0.2);
        color: #10b981;
        border: 1px solid #10b981;
      }

      .status-pending {
        background: rgba(245, 158, 11, 0.2);
        color: #f59e0b;
        border: 1px solid #f59e0b;
      }

      .status-disabled {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
        border: 1px solid #ef4444;
      }

      .status-not-started {
        background: rgba(156, 163, 175, 0.2);
        color: #9ca3af;
        border: 1px solid #9ca3af;
      }

      .action-btn {
        background: rgba(68, 191, 210, 0.2);
        border: 1px solid rgba(68, 191, 210, 0.3);
        color: #6cd4e8;
        padding: 6px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.85rem;
        transition: all 0.3s ease;
        margin-right: 5px;
      }

      .action-btn:hover {
        background: rgba(68, 191, 210, 0.3);
      }

      .loading {
        text-align: center;
        padding: 60px 20px;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(68, 191, 210, 0.2);
        border-top: 4px solid #6cd4e8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #9ca3af;
      }

      .empty-icon {
        font-size: 4rem;
        color: rgba(68, 191, 210, 0.3);
        margin-bottom: 20px;
      }

      /* Pagination */
      .pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        padding: 20px;
      }

      .page-btn {
        background: rgba(68, 191, 210, 0.2);
        border: 1px solid rgba(68, 191, 210, 0.3);
        color: #6cd4e8;
        padding: 8px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .page-btn:hover:not(:disabled) {
        background: rgba(68, 191, 210, 0.3);
      }

      .page-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .page-btn.active {
        background: #6cd4e8;
        color: #0a0a0a;
      }

      .page-info {
        color: #9ca3af;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="animated-gradient"></div>
    <div class="overlay"></div>

    <div class="header">
      <div class="header-content">
        <h1><i class="fab fa-stripe"></i> Stripe Connect Management</h1>
        <a href="admin-dashboard.html" class="back-btn">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </div>

    <div class="container">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-header">
            <div>
              <div class="stat-value" id="totalDrivers">0</div>
              <div class="stat-label">Total Drivers</div>
            </div>
            <div class="stat-icon icon-total">
              <i class="fas fa-users"></i>
            </div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-header">
            <div>
              <div class="stat-value" id="activeAccounts">0</div>
              <div class="stat-label">Active Accounts</div>
            </div>
            <div class="stat-icon icon-active">
              <i class="fas fa-check-circle"></i>
            </div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-header">
            <div>
              <div class="stat-value" id="pendingAccounts">0</div>
              <div class="stat-label">Pending Verification</div>
            </div>
            <div class="stat-icon icon-pending">
              <i class="fas fa-clock"></i>
            </div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-header">
            <div>
              <div class="stat-value" id="notStarted">0</div>
              <div class="stat-label">Not Started</div>
            </div>
            <div class="stat-icon icon-disabled">
              <i class="fas fa-times-circle"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters-section">
        <div class="filter-group">
          <span class="filter-label">Status:</span>
          <select class="filter-select" id="statusFilter" onchange="filterDrivers()">
            <option value="all">All</option>
            <option value="enabled">Active</option>
            <option value="pending">Pending</option>
            <option value="disabled">Disabled</option>
            <option value="not_started">Not Started</option>
          </select>
        </div>

        <div class="search-box">
          <i class="fas fa-search search-icon"></i>
          <input type="text" class="search-input" id="searchInput" placeholder="Search by name or email..." oninput="filterDrivers()">
        </div>

        <button class="refresh-btn" onclick="loadDrivers()">
          <i class="fas fa-sync"></i> Refresh
        </button>
      </div>

      <!-- Table -->
      <div class="table-container">
        <div class="table-header">
          <h3 class="table-title">Driver Accounts</h3>
        </div>

        <div id="loadingState" class="loading">
          <div class="spinner"></div>
          <p style="color: #9ca3af;">Loading drivers...</p>
        </div>

        <div id="tableContent" style="display: none;">
          <table>
            <thead>
              <tr>
                <th>Driver</th>
                <th>Account ID</th>
                <th>Status</th>
                <th>Charges</th>
                <th>Payouts</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="driversTableBody">
            </tbody>
          </table>

          <div class="pagination">
            <button class="page-btn" id="prevBtn" onclick="changePage(-1)">
              <i class="fas fa-chevron-left"></i> Previous
            </button>
            <span class="page-info" id="pageInfo">Page 1 of 1</span>
            <button class="page-btn" id="nextBtn" onclick="changePage(1)">
              Next <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
          <div class="empty-icon">
            <i class="fas fa-inbox"></i>
          </div>
          <h3>No drivers found</h3>
          <p>No drivers match your current filters.</p>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/auth-service.js"></script>
    <script src="js/admin-service.js"></script>

    <script>
      let allDrivers = [];
      let filteredDrivers = [];
      let currentPage = 1;
      const itemsPerPage = 20;

      window.addEventListener('DOMContentLoaded', async () => {
        const token = localStorage.getItem(CONFIG.STORAGE_KEYS.AUTH_TOKEN);
        const role = localStorage.getItem(CONFIG.STORAGE_KEYS.USER_ROLE);

        if (!token || role !== 'admin') {
          window.location.href = 'admin-login.html';
          return;
        }

        await loadDrivers();
      });

      async function loadDrivers() {
        try {
          document.getElementById('loadingState').style.display = 'block';
          document.getElementById('tableContent').style.display = 'none';
          document.getElementById('emptyState').style.display = 'none';

          const statusFilter = document.getElementById('statusFilter').value;
          const response = await ApiService.get(`/stripe-connect/admin/accounts?status=${statusFilter}&page=1&limit=1000`);

          if (response.success && response.accounts) {
            allDrivers = response.accounts;
          } else {
            // Mock data for testing
            allDrivers = generateMockDrivers();
          }

          updateStats();
          filterDrivers();

          document.getElementById('loadingState').style.display = 'none';
          if (filteredDrivers.length > 0) {
            document.getElementById('tableContent').style.display = 'block';
          } else {
            document.getElementById('emptyState').style.display = 'block';
          }
        } catch (error) {
          console.error('Error loading drivers:', error);
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('emptyState').style.display = 'block';
        }
      }

      function updateStats() {
        const stats = {
          total: allDrivers.length,
          active: allDrivers.filter(d => d.connectStatus === 'enabled').length,
          pending: allDrivers.filter(d => d.connectStatus === 'pending').length,
          notStarted: allDrivers.filter(d => d.connectStatus === 'not_started').length
        };

        document.getElementById('totalDrivers').textContent = stats.total;
        document.getElementById('activeAccounts').textContent = stats.active;
        document.getElementById('pendingAccounts').textContent = stats.pending;
        document.getElementById('notStarted').textContent = stats.notStarted;
      }

      function filterDrivers() {
        const statusFilter = document.getElementById('statusFilter').value;
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();

        filteredDrivers = allDrivers.filter(driver => {
          const matchesStatus = statusFilter === 'all' || driver.connectStatus === statusFilter;
          const matchesSearch = driver.name.toLowerCase().includes(searchTerm) ||
                               driver.email.toLowerCase().includes(searchTerm);
          return matchesStatus && matchesSearch;
        });

        currentPage = 1;
        displayDrivers();
      }

      function displayDrivers() {
        const tbody = document.getElementById('driversTableBody');
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageDrivers = filteredDrivers.slice(start, end);

        tbody.innerHTML = pageDrivers.map(driver => `
          <tr>
            <td>
              <div class="driver-info">
                <div class="driver-avatar">${driver.name.charAt(0).toUpperCase()}</div>
                <div class="driver-details">
                  <div class="driver-name">${driver.name}</div>
                  <div class="driver-email">${driver.email}</div>
                </div>
              </div>
            </td>
            <td>${driver.stripeAccountId || '-'}</td>
            <td>${getStatusBadge(driver.connectStatus)}</td>
            <td>${driver.chargesEnabled ? '<i class="fas fa-check" style="color: #10b981;"></i>' : '<i class="fas fa-times" style="color: #ef4444;"></i>'}</td>
            <td>${driver.payoutsEnabled ? '<i class="fas fa-check" style="color: #10b981;"></i>' : '<i class="fas fa-times" style="color: #ef4444;"></i>'}</td>
            <td>${driver.createdAt ? new Date(driver.createdAt).toLocaleDateString() : '-'}</td>
            <td>
              <button class="action-btn" onclick="viewDriver('${driver.riderId}')">
                <i class="fas fa-eye"></i> View
              </button>
              ${driver.connectStatus === 'not_started' || driver.connectStatus === 'pending' ?
                `<button class="action-btn" onclick="generateLink('${driver.riderId}')">
                  <i class="fas fa-link"></i> Link
                </button>` : ''}
            </td>
          </tr>
        `).join('');

        updatePagination();

        if (filteredDrivers.length === 0) {
          document.getElementById('tableContent').style.display = 'none';
          document.getElementById('emptyState').style.display = 'block';
        } else {
          document.getElementById('tableContent').style.display = 'block';
          document.getElementById('emptyState').style.display = 'none';
        }
      }

      function updatePagination() {
        const totalPages = Math.ceil(filteredDrivers.length / itemsPerPage);
        document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = currentPage === totalPages;
      }

      function changePage(delta) {
        currentPage += delta;
        displayDrivers();
      }

      function getStatusBadge(status) {
        const badges = {
          not_started: '<span class="status-badge status-not-started"><i class="fas fa-circle"></i> Not Started</span>',
          pending: '<span class="status-badge status-pending"><i class="fas fa-clock"></i> Pending</span>',
          enabled: '<span class="status-badge status-enabled"><i class="fas fa-check-circle"></i> Active</span>',
          disabled: '<span class="status-badge status-disabled"><i class="fas fa-times-circle"></i> Disabled</span>'
        };
        return badges[status] || badges.not_started;
      }

      async function viewDriver(riderId) {
        try {
          const response = await ApiService.get(`/stripe-connect/admin/account/${riderId}`);
          if (response.success) {
            alert(JSON.stringify(response.account, null, 2));
          }
        } catch (error) {
          console.error('Error viewing driver:', error);
          alert('Error loading driver details');
        }
      }

      async function generateLink(riderId) {
        try {
          const response = await ApiService.post(`/stripe-connect/admin/generate-link/${riderId}`);
          if (response.success && response.url) {
            prompt('Onboarding link generated. Share this with the driver:', response.url);
          } else {
            alert(response.message || 'Failed to generate link');
          }
        } catch (error) {
          console.error('Error generating link:', error);
          alert('Error generating onboarding link');
        }
      }

      function generateMockDrivers() {
        const statuses = ['enabled', 'pending', 'not_started', 'disabled'];
        const drivers = [];

        for (let i = 1; i <= 50; i++) {
          const status = statuses[Math.floor(Math.random() * statuses.length)];
          drivers.push({
            riderId: `driver_${i}`,
            name: `Driver ${i}`,
            email: `driver${i}@example.com`,
            stripeAccountId: status !== 'not_started' ? `acct_${Math.random().toString(36).substr(2, 16)}` : null,
            connectStatus: status,
            chargesEnabled: status === 'enabled',
            payoutsEnabled: status === 'enabled',
            createdAt: new Date(Date.now() - Math.random() * 30 * 24 * 60 * 60 * 1000).toISOString()
          });
        }

        return drivers;
      }
    </script>
  </body>
</html>
