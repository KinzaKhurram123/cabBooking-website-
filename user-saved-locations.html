<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Locations - RideLynk</title>
    <link rel="icon" href="images/icc.png" type="image/gif" sizes="16x16" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Inter", sans-serif;
        background: #0a0a0a;
        color: #e5e7eb;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .animated-gradient {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #44bfd2, #6cd4e8, #2e8b9e, #44bfd2, #6cd4e8);
        background-size: 400% 400%;
        animation: gradientShift 20s ease infinite;
        z-index: -2;
      }

      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: -1;
      }

      .header {
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-bottom: 1px solid rgba(68, 191, 210, 0.2);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-content {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        color: #6cd4e8;
        font-size: 1.8rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .back-btn {
        background: rgba(68, 191, 210, 0.2);
        border: 1px solid rgba(68, 191, 210, 0.3);
        padding: 10px 20px;
        border-radius: 8px;
        color: #6cd4e8;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        text-decoration: none;
      }

      .back-btn:hover {
        background: rgba(68, 191, 210, 0.3);
        box-shadow: 0 0 15px rgba(68, 191, 210, 0.3);
      }

      .container {
        max-width: 1200px;
        margin: 40px auto;
        padding: 20px;
      }

      .add-location-btn {
        background: linear-gradient(135deg, #44bfd2, #6cd4e8);
        color: #1a1a2e;
        border: none;
        padding: 15px 30px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 30px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .add-location-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(68, 191, 210, 0.4);
      }

      .locations-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 20px;
      }

      .location-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(68, 191, 210, 0.3);
        border-radius: 15px;
        padding: 25px;
        transition: all 0.3s ease;
      }

      .location-card:hover {
        transform: translateY(-5px);
        border-color: #44bfd2;
        box-shadow: 0 10px 30px rgba(68, 191, 210, 0.3);
      }

      .location-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 15px;
      }

      .location-icon-wrapper {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .location-icon {
        font-size: 2.5rem;
      }

      .location-info h3 {
        color: #44bfd2;
        font-size: 1.3rem;
        margin-bottom: 5px;
      }

      .location-info p {
        color: #d1d5db;
        font-size: 0.95rem;
        line-height: 1.6;
      }

      .location-actions {
        display: flex;
        gap: 10px;
      }

      .action-btn {
        background: rgba(68, 191, 210, 0.2);
        border: 1px solid rgba(68, 191, 210, 0.3);
        color: #6cd4e8;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.9rem;
      }

      .action-btn:hover {
        background: rgba(68, 191, 210, 0.3);
      }

      .action-btn.delete {
        border-color: rgba(239, 68, 68, 0.3);
        color: #ef4444;
      }

      .action-btn.delete:hover {
        background: rgba(239, 68, 68, 0.2);
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        background: rgba(26, 26, 46, 0.95);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(68, 191, 210, 0.3);
        border-radius: 20px;
        padding: 40px;
        max-width: 500px;
        width: 90%;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
      }

      .modal-header h2 {
        color: #44bfd2;
        font-size: 1.5rem;
      }

      .close-modal {
        background: none;
        border: none;
        color: #6cd4e8;
        font-size: 1.5rem;
        cursor: pointer;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        color: #44bfd2;
        margin-bottom: 8px;
        font-weight: 500;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 12px 15px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(68, 191, 210, 0.3);
        border-radius: 8px;
        color: #e5e7eb;
        font-family: "Inter", sans-serif;
        transition: all 0.3s ease;
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #44bfd2;
        background: rgba(255, 255, 255, 0.15);
      }

      .submit-btn {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #44bfd2, #6cd4e8);
        color: #1a1a2e;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(68, 191, 210, 0.4);
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #d1d5db;
      }

      .empty-state-icon {
        font-size: 4rem;
        margin-bottom: 20px;
      }

      .empty-state h3 {
        color: #44bfd2;
        font-size: 1.5rem;
        margin-bottom: 10px;
      }

      @media (max-width: 768px) {
        .locations-grid {
          grid-template-columns: 1fr;
        }

        .header h1 {
          font-size: 1.3rem;
        }

        .modal-content {
          padding: 25px;
        }
      }
    </style>
  </head>
  <body>
    <div class="animated-gradient"></div>
    <div class="overlay"></div>

    <div class="header">
      <div class="header-content">
        <h1>📍 Saved Locations</h1>
        <a href="dashboard-new.html" class="back-btn">← Back</a>
      </div>
    </div>

    <div class="container">
      <button class="add-location-btn" onclick="openModal()">
        <span>➕</span> Add New Location
      </button>

      <div class="locations-grid" id="locationsGrid">
        <!-- Locations will be loaded here -->
      </div>

      <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-state-icon">📍</div>
        <h3>No Saved Locations</h3>
        <p>Add your frequently visited places for quick booking</p>
      </div>
    </div>

    <!-- Add/Edit Location Modal -->
    <div class="modal" id="locationModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">Add Location</h2>
          <button class="close-modal" onclick="closeModal()">✕</button>
        </div>

        <form id="locationForm">
          <div class="form-group">
            <label for="locationType">Location Type</label>
            <select id="locationType" required>
              <option value="">Select Type</option>
              <option value="home">🏠 Home</option>
              <option value="work">💼 Work</option>
              <option value="gym">🏋️ Gym</option>
              <option value="school">🎓 School</option>
              <option value="restaurant">🍽️ Restaurant</option>
              <option value="shopping">🛍️ Shopping</option>
              <option value="other">📍 Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="locationName">Location Name</label>
            <input type="text" id="locationName" placeholder="e.g., My Home" required>
          </div>

          <div class="form-group">
            <label for="locationAddress">Full Address</label>
            <input type="text" id="locationAddress" placeholder="Enter complete address" required>
          </div>

          <div class="form-group">
            <label for="locationLat">Latitude (Optional)</label>
            <input type="text" id="locationLat" placeholder="e.g., 24.8607">
          </div>

          <div class="form-group">
            <label for="locationLng">Longitude (Optional)</label>
            <input type="text" id="locationLng" placeholder="e.g., 67.0011">
          </div>

          <button type="submit" class="submit-btn">Save Location</button>
        </form>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api-service.js"></script>
    <script>
      let savedLocations = [];
      let editingLocationId = null;

      const locationIcons = {
        home: '🏠',
        work: '💼',
        gym: '🏋️',
        school: '🎓',
        restaurant: '🍽️',
        shopping: '🛍️',
        other: '📍'
      };

      window.addEventListener('DOMContentLoaded', async () => {
        if (!localStorage.getItem('authToken')) {
          window.location.href = 'login.html';
          return;
        }

        await loadSavedLocations();
      });

      async function loadSavedLocations() {
        try {
          const response = await ApiService.get('/user/saved-locations');

          if (response?.data) {
            savedLocations = response.data;
            renderLocations();
          }
        } catch (error) {
          console.error('Error loading saved locations:', error);
          // Load from localStorage as fallback
          const stored = localStorage.getItem('savedLocations');
          if (stored) {
            savedLocations = JSON.parse(stored);
            renderLocations();
          } else {
            document.getElementById('emptyState').style.display = 'block';
          }
        }
      }

      function renderLocations() {
        const grid = document.getElementById('locationsGrid');
        const emptyState = document.getElementById('emptyState');

        if (savedLocations.length === 0) {
          grid.innerHTML = '';
          emptyState.style.display = 'block';
          return;
        }

        emptyState.style.display = 'none';

        grid.innerHTML = savedLocations.map(location => `
          <div class="location-card">
            <div class="location-header">
              <div class="location-icon-wrapper">
                <div class="location-icon">${locationIcons[location.type] || '📍'}</div>
                <div class="location-info">
                  <h3>${location.name}</h3>
                  <p>${location.address}</p>
                </div>
              </div>
            </div>
            <div class="location-actions">
              <button class="action-btn" onclick="editLocation('${location.id}')">✏️ Edit</button>
              <button class="action-btn delete" onclick="deleteLocation('${location.id}')">🗑️ Delete</button>
            </div>
          </div>
        `).join('');
      }

      function openModal() {
        editingLocationId = null;
        document.getElementById('modalTitle').textContent = 'Add Location';
        document.getElementById('locationForm').reset();
        document.getElementById('locationModal').classList.add('active');
      }

      function closeModal() {
        document.getElementById('locationModal').classList.remove('active');
        editingLocationId = null;
      }

      function editLocation(id) {
        const location = savedLocations.find(loc => loc.id === id);
        if (!location) return;

        editingLocationId = id;
        document.getElementById('modalTitle').textContent = 'Edit Location';
        document.getElementById('locationType').value = location.type;
        document.getElementById('locationName').value = location.name;
        document.getElementById('locationAddress').value = location.address;
        document.getElementById('locationLat').value = location.latitude || '';
        document.getElementById('locationLng').value = location.longitude || '';

        document.getElementById('locationModal').classList.add('active');
      }

      async function deleteLocation(id) {
        if (!confirm('Are you sure you want to delete this location?')) return;

        try {
          await ApiService.delete(`/user/saved-locations/${id}`);
          savedLocations = savedLocations.filter(loc => loc.id !== id);
          localStorage.setItem('savedLocations', JSON.stringify(savedLocations));
          renderLocations();
          showNotification('Location deleted successfully', 'success');
        } catch (error) {
          console.error('Error deleting location:', error);
          showNotification('Failed to delete location', 'error');
        }
      }

      document.getElementById('locationForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const locationData = {
          type: document.getElementById('locationType').value,
          name: document.getElementById('locationName').value,
          address: document.getElementById('locationAddress').value,
          latitude: document.getElementById('locationLat').value || null,
          longitude: document.getElementById('locationLng').value || null
        };

        try {
          if (editingLocationId) {
            const response = await ApiService.put(`/user/saved-locations/${editingLocationId}`, locationData);
            const index = savedLocations.findIndex(loc => loc.id === editingLocationId);
            if (index !== -1) {
              savedLocations[index] = { ...savedLocations[index], ...locationData };
            }
            showNotification('Location updated successfully', 'success');
          } else {
            const response = await ApiService.post('/user/saved-locations', locationData);
            const newLocation = {
              id: response?.data?.id || Date.now().toString(),
              ...locationData
            };
            savedLocations.push(newLocation);
            showNotification('Location added successfully', 'success');
          }

          localStorage.setItem('savedLocations', JSON.stringify(savedLocations));
          renderLocations();
          closeModal();
        } catch (error) {
          console.error('Error saving location:', error);
          showNotification('Failed to save location', 'error');
        }
      });

      function showNotification(message, type) {
        alert(message);
      }
    </script>
  </body>
</html>
