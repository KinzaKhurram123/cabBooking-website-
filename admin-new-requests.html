<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Ride Requests - Admin - RideLynk</title>
    <link rel="icon" href="images/icc.png" type="image/gif" sizes="16x16" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Inter", sans-serif;
        background: #000000;
        color: #e5e7eb;
      }

      .header {
        background: linear-gradient(135deg, #000000 0%, #0a0a0a 100%);
        padding: 20px;
        border-bottom: 1px solid rgba(0, 173, 239, 0.2);
        box-shadow: 0 2px 10px rgba(0, 173, 239, 0.1);
      }

      .header-content {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        color: #00ADEF;
        font-size: 1.8rem;
      }

      .back-btn {
        background: rgba(0, 173, 239, 0.2);
        border: 1px solid rgba(0, 173, 239, 0.3);
        padding: 10px 20px;
        border-radius: 8px;
        color: #00ADEF;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .back-btn:hover {
        background: rgba(0, 173, 239, 0.3);
        box-shadow: 0 0 15px rgba(0, 173, 239, 0.3);
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 30px 20px;
      }

      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 30px;
      }

      .stat-card {
        background: #0a0a0a;
        padding: 25px;
        border-radius: 15px;
        border: 1px solid rgba(0, 173, 239, 0.2);
        transition: all 0.3s ease;
      }

      .stat-card:hover {
        border-color: rgba(0, 173, 239, 0.5);
        box-shadow: 0 0 20px rgba(0, 173, 239, 0.2);
      }

      .stat-value {
        font-size: 2.5rem;
        font-weight: 700;
        color: #00ADEF;
        margin-bottom: 5px;
      }

      .stat-label {
        color: #9ca3af;
        font-size: 0.9rem;
      }

      .requests-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
        gap: 20px;
      }

      .request-card {
        background: #0a0a0a;
        border: 1px solid rgba(0, 173, 239, 0.2);
        border-radius: 15px;
        padding: 20px;
        transition: all 0.3s ease;
      }

      .request-card:hover {
        border-color: rgba(0, 173, 239, 0.5);
        box-shadow: 0 0 20px rgba(0, 173, 239, 0.2);
        transform: translateY(-2px);
      }

      .request-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(0, 173, 239, 0.1);
      }

      .booking-id {
        font-size: 1.1rem;
        font-weight: 700;
        color: #00ADEF;
      }

      .time-badge {
        background: rgba(245, 158, 11, 0.2);
        color: #f59e0b;
        padding: 5px 12px;
        border-radius: 12px;
        font-size: 0.85rem;
        font-weight: 600;
        border: 1px solid #f59e0b;
      }

      .request-info {
        margin-bottom: 15px;
      }

      .info-row {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
        color: #9ca3af;
      }

      .info-label {
        font-weight: 600;
        color: #00ADEF;
        min-width: 80px;
      }

      .location-section {
        background: rgba(0, 173, 239, 0.05);
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 15px;
        border: 1px solid rgba(0, 173, 239, 0.1);
      }

      .location-row {
        display: flex;
        align-items: flex-start;
        margin-bottom: 8px;
      }

      .location-row:last-child {
        margin-bottom: 0;
      }

      .location-icon {
        color: #00ADEF;
        margin-right: 10px;
        font-size: 1.2rem;
      }

      .location-text {
        color: #e5e7eb;
        font-size: 0.9rem;
        line-height: 1.4;
      }

      .action-buttons {
        display: flex;
        gap: 10px;
      }

      .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-assign {
        background: #00ADEF;
        color: #000000;
      }

      .btn-assign:hover {
        background: #00e5ff;
        box-shadow: 0 0 15px rgba(0, 173, 239, 0.5);
      }

      .btn-reject {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
        border: 1px solid #ef4444;
      }

      .btn-reject:hover {
        background: rgba(239, 68, 68, 0.3);
      }

      .empty-state {
        text-align: center;
        padding: 80px 20px;
        background: #0a0a0a;
        border-radius: 15px;
        border: 1px solid rgba(0, 173, 239, 0.2);
      }

      .empty-icon {
        font-size: 5rem;
        margin-bottom: 20px;
      }

      .loading {
        text-align: center;
        padding: 60px 20px;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(0, 173, 239, 0.2);
        border-top: 4px solid #00ADEF;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @media (max-width: 768px) {
        .stats-row {
          grid-template-columns: 1fr;
        }

        .requests-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-content">
        <h1>🔔 New Ride Requests</h1>
        <button class="back-btn" onclick="window.location.href='admin-dashboard.html'">← Back to Dashboard</button>
      </div>
    </div>

    <div class="container">
      <div id="loadingState" class="loading">
        <div class="spinner"></div>
        <p style="color: #9ca3af;">Loading new requests...</p>
      </div>

      <div id="contentArea" style="display: none;">
        <!-- Stats -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-value" id="pendingCount">0</div>
            <div class="stat-label">Pending Requests</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="avgWaitTime">0 min</div>
            <div class="stat-label">Avg Wait Time</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="availableDrivers">0</div>
            <div class="stat-label">Available Drivers</div>
          </div>
        </div>

        <!-- Requests Grid -->
        <div class="requests-grid" id="requestsGrid">
          <!-- Request cards will be inserted here -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
          <div class="empty-icon">✅</div>
          <h2 style="color: #00ADEF;">All Caught Up!</h2>
          <p style="color: #9ca3af; margin-top: 10px;">No new ride requests at the moment</p>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/auth-service.js"></script>
    <script src="js/ride-service.js"></script>

    <script>
      let pendingRides = [];

      window.addEventListener('DOMContentLoaded', async () => {
        const token = localStorage.getItem(CONFIG.STORAGE_KEYS.AUTH_TOKEN);
        const role = localStorage.getItem(CONFIG.STORAGE_KEYS.USER_ROLE);

        if (!token || role !== 'admin') {
          window.location.href = 'login.html';
          return;
        }

        await loadPendingRequests();
        setInterval(loadPendingRequests, 30000); // Refresh every 30 seconds
      });

      async function loadPendingRequests() {
        try {
          const response = await RideService.getAllRides();

          if (response.success !== false && response.rides) {
            pendingRides = response.rides.filter(r => r.status === 'pending');
            updateStats();
            displayRequests();

            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('contentArea').style.display = 'block';
          }
        } catch (error) {
          console.error('Error loading requests:', error);
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('contentArea').style.display = 'block';
          document.getElementById('emptyState').style.display = 'block';
        }
      }

      function updateStats() {
        document.getElementById('pendingCount').textContent = pendingRides.length;

        if (pendingRides.length > 0) {
          const avgWait = pendingRides.reduce((sum, r) => {
            const waitTime = Math.floor((Date.now() - new Date(r.createdAt)) / 60000);
            return sum + waitTime;
          }, 0) / pendingRides.length;
          document.getElementById('avgWaitTime').textContent = Math.floor(avgWait) + ' min';
        } else {
          document.getElementById('avgWaitTime').textContent = '0 min';
        }

        document.getElementById('availableDrivers').textContent = '12'; // Mock data
      }

      function displayRequests() {
        const grid = document.getElementById('requestsGrid');
        const emptyState = document.getElementById('emptyState');

        if (pendingRides.length === 0) {
          grid.style.display = 'none';
          emptyState.style.display = 'block';
          return;
        }

        grid.style.display = 'grid';
        emptyState.style.display = 'none';

        grid.innerHTML = pendingRides.map(ride => {
          const waitTime = Math.floor((Date.now() - new Date(ride.createdAt)) / 60000);
          return `
            <div class="request-card">
              <div class="request-header">
                <div class="booking-id">#${ride._id.slice(-8).toUpperCase()}</div>
                <div class="time-badge">${waitTime} min ago</div>
              </div>

              <div class="request-info">
                <div class="info-row">
                  <span class="info-label">User:</span>
                  <span>${ride.user?.name || 'N/A'}</span>
                </div>
                <div class="info-row">
                  <span class="info-label">Phone:</span>
                  <span>${ride.user?.phone || 'N/A'}</span>
                </div>
                <div class="info-row">
                  <span class="info-label">Fare:</span>
                  <span style="color: #00ADEF; font-weight: 700;">$${(ride.fare || 0).toFixed(2)}</span>
                </div>
              </div>

              <div class="location-section">
                <div class="location-row">
                  <span class="location-icon">📍</span>
                  <div class="location-text">
                    <strong>Pickup:</strong><br>
                    ${ride.pickupLocationName || 'N/A'}
                  </div>
                </div>
                <div class="location-row">
                  <span class="location-icon">🎯</span>
                  <div class="location-text">
                    <strong>Dropoff:</strong><br>
                    ${ride.dropoffLocationName || 'N/A'}
                  </div>
                </div>
              </div>

              <div class="action-buttons">
                <button class="btn btn-assign" onclick="assignDriver('${ride._id}')">
                  Assign Driver
                </button>
                <button class="btn btn-reject" onclick="rejectRequest('${ride._id}')">
                  Reject
                </button>
              </div>
            </div>
          `;
        }).join('');
      }

      function assignDriver(rideId) {
        alert('Driver assignment feature coming soon!\nBooking ID: ' + rideId);
      }

      async function rejectRequest(rideId) {
        if (!confirm('Are you sure you want to reject this ride request?')) {
          return;
        }

        const reason = prompt('Rejection reason:');
        if (!reason) return;

        try {
          const response = await RideService.adminCancelRide(rideId, reason);

          if (response.success !== false) {
            alert('Ride request rejected');
            await loadPendingRequests();
          } else {
            throw new Error(response.message || 'Failed to reject request');
          }
        } catch (error) {
          console.error('Error rejecting request:', error);
          alert('Failed to reject request: ' + error.message);
        }
      }
    </script>
  </body>
</html>
