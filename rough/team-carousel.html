<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board of Directors</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        section {
            background: #1a1a2e;
            padding: 60px 20px;
            color: #fff;
        }

        h2 {
            text-align: center;
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 40px;
        }

        .carousel-wrapper {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
            overflow: hidden;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.4s ease;
        }

        .carousel-slide {
            min-width: 25%;
            padding: 0 12px;
            flex-shrink: 0;
        }

        .f-profile {
            text-align: center;
        }

        .fp-wrap {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 14px;
        }

        .fp-image {
            width: 100%;
            display: block;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }

        .fp-wrap:hover .fp-image {
            transform: scale(1.05);
        }

        .fpw-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 8px;
            z-index: 2;
        }

        .fp-wrap:hover .fpw-overlay {
            opacity: 1;
        }

        .fpwow-icons a {
            color: #fff;
            margin: 0 8px;
            font-size: 18px;
            transition: color 0.2s;
        }

        .fpwow-icons a:hover {
            color: #aad4f5;
        }

        .f-profile h4 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .f-profile span {
            font-size: 13px;
            color: rgba(255,255,255,0.65);
        }

        /* Nav buttons */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-60%);
            background: rgba(255,255,255,0.12);
            border: 0.5px solid rgba(255,255,255,0.25);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.2s;
        }

        .carousel-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .carousel-btn.prev { left: -18px; }
        .carousel-btn.next { right: -18px; }

        /* Dots */
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 28px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: background 0.2s;
        }

        .dot.active {
            background: #fff;
        }

        @media (max-width: 768px) {
            .carousel-slide { min-width: 50%; }
        }

        @media (max-width: 480px) {
            .carousel-slide { min-width: 100%; }
        }
    </style>
</head>
<body>

<section>
    <h2>Board of Directors</h2>

    <div class="carousel-wrapper">
        <button class="carousel-btn prev" onclick="move(-1)">&#8249;</button>

        <div class="carousel-track" id="track">

            <div class="carousel-slide">
                <div class="f-profile">
                    <div class="fp-wrap">
                        <div class="fpw-overlay">
                            <div class="fpwow-icons">
                                <a href="#"><i class="fa fa-facebook"></i></a>
                                <a href="#"><i class="fa fa-twitter"></i></a>
                                <a href="#"><i class="fa fa-linkedin"></i></a>
                                <a href="#"><i class="fa fa-pinterest"></i></a>
                            </div>
                        </div>
                        <img src="images/team/1.jpg" class="fp-image" alt="Fynley Wilkinson">
                    </div>
                    <h4>Fynley Wilkinson</h4>
                    <span>Chief Creative Officer</span>
                </div>
            </div>

            <div class="carousel-slide">
                <div class="f-profile">
                    <div class="fp-wrap">
                        <div class="fpw-overlay">
                            <div class="fpwow-icons">
                                <a href="#"><i class="fa fa-facebook"></i></a>
                                <a href="#"><i class="fa fa-twitter"></i></a>
                                <a href="#"><i class="fa fa-linkedin"></i></a>
                                <a href="#"><i class="fa fa-pinterest"></i></a>
                            </div>
                        </div>
                        <img src="images/team/2.jpg" class="fp-image" alt="Peter Welsh">
                    </div>
                    <h4>Peter Welsh</h4>
                    <span>Chief Technology Officer</span>
                </div>
            </div>

            <div class="carousel-slide">
                <div class="f-profile">
                    <div class="fp-wrap">
                        <div class="fpw-overlay">
                            <div class="fpwow-icons">
                                <a href="#"><i class="fa fa-facebook"></i></a>
                                <a href="#"><i class="fa fa-twitter"></i></a>
                                <a href="#"><i class="fa fa-linkedin"></i></a>
                                <a href="#"><i class="fa fa-pinterest"></i></a>
                            </div>
                        </div>
                        <img src="images/team/3.jpg" class="fp-image" alt="John Shepard">
                    </div>
                    <h4>John Shepard</h4>
                    <span>Chief Executive Officer</span>
                </div>
            </div>

            <div class="carousel-slide">
                <div class="f-profile">
                    <div class="fp-wrap">
                        <div class="fpw-overlay">
                            <div class="fpwow-icons">
                                <a href="#"><i class="fa fa-facebook"></i></a>
                                <a href="#"><i class="fa fa-twitter"></i></a>
                                <a href="#"><i class="fa fa-linkedin"></i></a>
                                <a href="#"><i class="fa fa-pinterest"></i></a>
                            </div>
                        </div>
                        <img src="images/team/4.jpg" class="fp-image" alt="Robyn Peel">
                    </div>
                    <h4>Robyn Peel</h4>
                    <span>Director of Finance</span>
                </div>
            </div>

            <div class="carousel-slide">
                <div class="f-profile">
                    <div class="fp-wrap">
                        <div class="fpw-overlay">
                            <div class="fpwow-icons">
                                <a href="#"><i class="fa fa-facebook"></i></a>
                                <a href="#"><i class="fa fa-twitter"></i></a>
                                <a href="#"><i class="fa fa-linkedin"></i></a>
                                <a href="#"><i class="fa fa-pinterest"></i></a>
                            </div>
                        </div>
                        <img src="images/team/4.jpg" class="fp-image" alt="Robyn Peel">
                    </div>
                    <h4>Robyn Peel</h4>
                    <span>Director of Finance</span>
                </div>
            </div>

            <div class="carousel-slide">
                <div class="f-profile">
                    <div class="fp-wrap">
                        <div class="fpw-overlay">
                            <div class="fpwow-icons">
                                <a href="#"><i class="fa fa-facebook"></i></a>
                                <a href="#"><i class="fa fa-twitter"></i></a>
                                <a href="#"><i class="fa fa-linkedin"></i></a>
                                <a href="#"><i class="fa fa-pinterest"></i></a>
                            </div>
                        </div>
                        <img src="images/team/4.jpg" class="fp-image" alt="Robyn Peel">
                    </div>
                    <h4>Robyn Peel</h4>
                    <span>Director of Finance</span>
                </div>
            </div>

        </div>

        <button class="carousel-btn next" onclick="move(1)">&#8250;</button>
    </div>

    <div class="carousel-dots" id="dots"></div>
</section>

<script>
    const track = document.getElementById('track');
    const dotsContainer = document.getElementById('dots');
    const slides = document.querySelectorAll('.carousel-slide');

    let visibleCount = getVisible();
    let current = 0;
    const total = slides.length;
    const pages = Math.ceil(total / visibleCount);

    function getVisible() {
        return window.innerWidth <= 480 ? 1 : window.innerWidth <= 768 ? 2 : 4;
    }

    function buildDots() {
        dotsContainer.innerHTML = '';
        const p = Math.ceil(total / getVisible());
        for (let i = 0; i < p; i++) {
            const d = document.createElement('div');
            d.className = 'dot' + (i === Math.floor(current / getVisible()) ? ' active' : '');
            d.onclick = () => goTo(i * getVisible());
            dotsContainer.appendChild(d);
        }
    }

    function updateDots() {
        const v = getVisible();
        document.querySelectorAll('.dot').forEach((d, i) => {
            d.classList.toggle('active', i === Math.floor(current / v));
        });
    }

    function goTo(index) {
        const v = getVisible();
        const maxIndex = total - v;
        current = Math.max(0, Math.min(index, maxIndex));
        track.style.transform = `translateX(-${current * (100 / v)}%)`;
        updateDots();
    }

    function move(dir) {
        goTo(current + dir);
    }

    window.addEventListener('resize', () => {
        current = 0;
        buildDots();
        goTo(0);
    });

    buildDots();
    goTo(0);
</script>

</body>
</html>
