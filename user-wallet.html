<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Wallet - RideLynk</title>
    <link rel="icon" href="images/icc.png" type="image/gif" sizes="16x16" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Inter", sans-serif;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        color: white;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Animated Gradient Background */
      .animated-gradient {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #44bfd2, #6cd4e8, #2e8b9e, #44bfd2, #6cd4e8);
        background-size: 400% 400%;
        animation: gradientShift 20s ease infinite;
        z-index: -2;
      }

      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: -1;
      }

      .header {
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-bottom: 1px solid rgba(68, 191, 210, 0.2);
        box-shadow: 0 2px 10px rgba(68, 191, 210, 0.1);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-content {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        color: #6cd4e8;
        font-size: 1.8rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .back-btn {
        background: rgba(68, 191, 210, 0.2);
        border: 1px solid rgba(68, 191, 210, 0.3);
        padding: 10px 20px;
        border-radius: 8px;
        color: #6cd4e8;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .back-btn:hover {
        background: rgba(0, 173, 239, 0.3);
        box-shadow: 0 0 15px rgba(0, 173, 239, 0.3);
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px 20px;
      }

      /* Balance Card */
      .balance-card {
        background: linear-gradient(135deg, #44bfd2 0%, #6cd4e8 100%);
        border-radius: 20px;
        padding: 40px;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0, 173, 239, 0.3);
        position: relative;
        overflow: hidden;
      }

      .balance-card::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -20%;
        width: 300px;
        height: 300px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
      }

      .balance-label {
        color: rgba(0, 0, 0, 0.7);
        font-size: 0.95rem;
        margin-bottom: 10px;
        font-weight: 600;
      }

      .balance-amount {
        font-size: 3.5rem;
        font-weight: 800;
        color: #000000;
        margin-bottom: 25px;
      }

      .balance-actions {
        display: flex;
        gap: 15px;
      }

      .balance-btn {
        flex: 1;
        padding: 15px 25px;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 1rem;
      }

      .btn-add {
        background: #000000;
        color: #6cd4e8;
      }

      .btn-add:hover {
        background: #1a1a1a;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      .btn-withdraw {
        background: rgba(0, 0, 0, 0.2);
        color: #000000;
        border: 2px solid #000000;
      }

      .btn-withdraw:hover {
        background: rgba(0, 0, 0, 0.3);
      }

      /* Quick Stats */
      .quick-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .stat-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        padding: 25px;
        border-radius: 12px;
        border: 1px solid rgba(68, 191, 210, 0.2);
        transition: all 0.3s ease;
      }

      .stat-card:hover {
        border-color: rgba(0, 173, 239, 0.5);
        box-shadow: 0 0 20px rgba(0, 173, 239, 0.2);
      }

      .stat-icon {
        width: 50px;
        height: 50px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        margin-bottom: 15px;
      }

      .icon-spent {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
      }

      .icon-earned {
        background: rgba(16, 185, 129, 0.2);
        color: #10b981;
      }

      .icon-saved {
        background: rgba(245, 158, 11, 0.2);
        color: #f59e0b;
      }

      .stat-value {
        font-size: 1.8rem;
        font-weight: 700;
        color: #6cd4e8;
        margin-bottom: 5px;
      }

      .stat-label {
        color: #9ca3af;
        font-size: 0.9rem;
      }

      /* Payment Methods */
      .section {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(68, 191, 210, 0.2);
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 20px;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(0, 173, 239, 0.1);
      }

      .section-title {
        color: #6cd4e8;
        font-size: 1.3rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .add-btn {
        background: rgba(68, 191, 210, 0.2);
        border: 1px solid rgba(68, 191, 210, 0.3);
        padding: 10px 20px;
        border-radius: 8px;
        color: #6cd4e8;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .add-btn:hover {
        background: rgba(0, 173, 239, 0.3);
      }

      .payment-methods {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 15px;
      }

      .payment-card {
        background: rgba(0, 173, 239, 0.05);
        border: 1px solid rgba(68, 191, 210, 0.2);
        border-radius: 12px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .payment-card:hover {
        border-color: rgba(0, 173, 239, 0.5);
        background: rgba(0, 173, 239, 0.1);
      }

      .payment-card.default {
        border-color: #00ADEF;
        background: rgba(0, 173, 239, 0.1);
      }

      .payment-icon {
        width: 50px;
        height: 50px;
        border-radius: 10px;
        background: rgba(68, 191, 210, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: #6cd4e8;
      }

      .payment-info {
        flex: 1;
      }

      .payment-type {
        color: #e5e7eb;
        font-weight: 600;
        margin-bottom: 5px;
      }

      .payment-details {
        color: #9ca3af;
        font-size: 0.85rem;
      }

      .default-badge {
        background: rgba(16, 185, 129, 0.2);
        color: #10b981;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 600;
        border: 1px solid #10b981;
      }

      /* Transactions */
      .transaction-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .transaction-item {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 15px;
        background: rgba(0, 173, 239, 0.05);
        border-radius: 10px;
        border: 1px solid rgba(0, 173, 239, 0.1);
        transition: all 0.3s ease;
      }

      .transaction-item:hover {
        background: rgba(0, 173, 239, 0.1);
        border-color: rgba(0, 173, 239, 0.3);
      }

      .transaction-icon {
        width: 45px;
        height: 45px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
      }

      .icon-credit {
        background: rgba(16, 185, 129, 0.2);
        color: #10b981;
      }

      .icon-debit {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
      }

      .transaction-details {
        flex: 1;
      }

      .transaction-title {
        color: #e5e7eb;
        font-weight: 600;
        margin-bottom: 3px;
      }

      .transaction-date {
        color: #9ca3af;
        font-size: 0.85rem;
      }

      .transaction-amount {
        font-size: 1.2rem;
        font-weight: 700;
      }

      .amount-credit {
        color: #10b981;
      }

      .amount-debit {
        color: #ef4444;
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #9ca3af;
      }

      .empty-icon {
        font-size: 4rem;
        margin-bottom: 15px;
        color: #6cd4e8;
      }

      /* Loading */
      .loading {
        text-align: center;
        padding: 60px 20px;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(0, 173, 239, 0.2);
        border-top: 4px solid #00ADEF;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* Responsive */
      @media (max-width: 768px) {
        .balance-amount {
          font-size: 2.5rem;
        }

        .balance-actions {
          flex-direction: column;
        }

        .payment-methods {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Animated Background -->
    <div class="animated-gradient"></div>
    <div class="overlay"></div>

    <div class="header">
      <div class="header-content">
        <h1><i class="fas fa-wallet"></i> My Wallet</h1>
        <a href="dashboard.html" class="back-btn">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </div>

    <div class="container">
      <div id="loadingState" class="loading">
        <div class="spinner"></div>
        <p style="color: #9ca3af;">Loading wallet...</p>
      </div>

      <div id="contentArea" style="display: none;">
        <!-- Balance Card -->
        <div class="balance-card">
          <div class="balance-label">Available Balance</div>
          <div class="balance-amount" id="walletBalance">$0.00</div>
          <div class="balance-actions">
            <button class="balance-btn btn-add" onclick="addMoney()">
              <i class="fas fa-plus"></i> Add Money
            </button>
            <button class="balance-btn btn-withdraw" onclick="withdrawMoney()">
              <i class="fas fa-arrow-down"></i> Withdraw
            </button>
          </div>
        </div>

        <!-- Quick Stats -->
        <div class="quick-stats">
          <div class="stat-card">
            <div class="stat-icon icon-spent">
              <i class="fas fa-arrow-up"></i>
            </div>
            <div class="stat-value" id="totalSpent">$0</div>
            <div class="stat-label">Total Spent</div>
          </div>

          <div class="stat-card">
            <div class="stat-icon icon-earned">
              <i class="fas fa-arrow-down"></i>
            </div>
            <div class="stat-value" id="totalAdded">$0</div>
            <div class="stat-label">Total Added</div>
          </div>

          <div class="stat-card">
            <div class="stat-icon icon-saved">
              <i class="fas fa-piggy-bank"></i>
            </div>
            <div class="stat-value" id="totalSaved">$0</div>
            <div class="stat-label">Saved via Offers</div>
          </div>
        </div>

        <!-- Payment Methods -->
        <div class="section">
          <div class="section-header">
            <h2 class="section-title">
              <i class="fas fa-credit-card"></i> Payment Methods
            </h2>
            <button class="add-btn" onclick="addPaymentMethod()">
              <i class="fas fa-plus"></i> Add New
            </button>
          </div>

          <div class="payment-methods" id="paymentMethods">
            <!-- Payment methods will be inserted here -->
          </div>
        </div>

        <!-- Recent Transactions -->
        <div class="section">
          <div class="section-header">
            <h2 class="section-title">
              <i class="fas fa-history"></i> Recent Transactions
            </h2>
            <button class="add-btn" onclick="viewAllTransactions()">
              View All
            </button>
          </div>

          <div class="transaction-list" id="transactionList">
            <!-- Transactions will be inserted here -->
          </div>

          <div class="empty-state" id="emptyTransactions" style="display: none;">
            <div class="empty-icon">
              <i class="fas fa-receipt"></i>
            </div>
            <p>No transactions yet</p>
          </div>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/auth-service.js"></script>

    <script>
      let walletData = null;

      window.addEventListener('DOMContentLoaded', async () => {
        const token = localStorage.getItem(CONFIG.STORAGE_KEYS.AUTH_TOKEN);

        if (!token) {
          window.location.href = 'login.html';
          return;
        }

        await loadWalletData();
      });

      async function loadWalletData() {
        try {
          const response = await ApiService.get('/user/wallet');

          if (response.success !== false && response.wallet) {
            walletData = response.wallet;
            displayWalletData(walletData);
          } else {
            // Mock data if API fails
            walletData = {
              balance: 125.50,
              totalSpent: 450.00,
              totalAdded: 575.50,
              totalSaved: 45.00,
              paymentMethods: [
                {
                  id: 1,
                  type: 'Credit Card',
                  details: '**** **** **** 4242',
                  isDefault: true
                },
                {
                  id: 2,
                  type: 'PayPal',
                  details: 'user@example.com',
                  isDefault: false
                }
              ],
              transactions: [
                {
                  id: 1,
                  type: 'debit',
                  title: 'Ride Payment',
                  date: new Date().toISOString(),
                  amount: 25.50
                },
                {
                  id: 2,
                  type: 'credit',
                  title: 'Wallet Top-up',
                  date: new Date(Date.now() - 86400000).toISOString(),
                  amount: 100.00
                },
                {
                  id: 3,
                  type: 'debit',
                  title: 'Ride Payment',
                  date: new Date(Date.now() - 172800000).toISOString(),
                  amount: 18.75
                }
              ]
            };
            displayWalletData(walletData);
          }

          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('contentArea').style.display = 'block';
        } catch (error) {
          console.error('Error loading wallet:', error);
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('contentArea').style.display = 'block';
        }
      }

      function displayWalletData(data) {
        // Balance
        document.getElementById('walletBalance').textContent = '$' + (data.balance || 0).toFixed(2);

        // Stats
        document.getElementById('totalSpent').textContent = '$' + (data.totalSpent || 0).toFixed(2);
        document.getElementById('totalAdded').textContent = '$' + (data.totalAdded || 0).toFixed(2);
        document.getElementById('totalSaved').textContent = '$' + (data.totalSaved || 0).toFixed(2);

        // Payment Methods
        displayPaymentMethods(data.paymentMethods || []);

        // Transactions
        displayTransactions(data.transactions || []);
      }

      function displayPaymentMethods(methods) {
        const container = document.getElementById('paymentMethods');

        if (methods.length === 0) {
          container.innerHTML = '<div class="empty-state"><p>No payment methods added</p></div>';
          return;
        }

        container.innerHTML = methods.map(method => `
          <div class="payment-card ${method.isDefault ? 'default' : ''}" onclick="selectPaymentMethod(${method.id})">
            <div class="payment-icon">
              <i class="fas fa-${method.type === 'Credit Card' ? 'credit-card' : method.type === 'PayPal' ? 'paypal' : 'wallet'}"></i>
            </div>
            <div class="payment-info">
              <div class="payment-type">${method.type}</div>
              <div class="payment-details">${method.details}</div>
            </div>
            ${method.isDefault ? '<span class="default-badge">Default</span>' : ''}
          </div>
        `).join('');
      }

      function displayTransactions(transactions) {
        const container = document.getElementById('transactionList');
        const emptyState = document.getElementById('emptyTransactions');

        if (transactions.length === 0) {
          container.style.display = 'none';
          emptyState.style.display = 'block';
          return;
        }

        container.style.display = 'flex';
        emptyState.style.display = 'none';

        container.innerHTML = transactions.slice(0, 5).map(txn => `
          <div class="transaction-item">
            <div class="transaction-icon icon-${txn.type}">
              <i class="fas fa-${txn.type === 'credit' ? 'arrow-down' : 'arrow-up'}"></i>
            </div>
            <div class="transaction-details">
              <div class="transaction-title">${txn.title}</div>
              <div class="transaction-date">${new Date(txn.date).toLocaleString()}</div>
            </div>
            <div class="transaction-amount amount-${txn.type}">
              ${txn.type === 'credit' ? '+' : '-'}$${txn.amount.toFixed(2)}
            </div>
          </div>
        `).join('');
      }

      function addMoney() {
        const amount = prompt('Enter amount to add:');
        if (amount && !isNaN(amount) && parseFloat(amount) > 0) {
          alert('Add money feature coming soon!\nAmount: $' + parseFloat(amount).toFixed(2));
        }
      }

      function withdrawMoney() {
        const amount = prompt('Enter amount to withdraw:');
        if (amount && !isNaN(amount) && parseFloat(amount) > 0) {
          alert('Withdraw feature coming soon!\nAmount: $' + parseFloat(amount).toFixed(2));
        }
      }

      function addPaymentMethod() {
        alert('Add payment method feature coming soon!');
      }

      function selectPaymentMethod(methodId) {
        alert('Payment method selected: ' + methodId);
      }

      function viewAllTransactions() {
        alert('View all transactions feature coming soon!');
      }
    </script>
  </body>
</html>
