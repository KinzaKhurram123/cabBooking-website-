<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password - RideLynk</title>
    <link rel="icon" href="images/icc.png" type="image/gif" sizes="16x16" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Inter", sans-serif;
        background: #0a0a0a;
        color: #e5e7eb;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .animated-gradient {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #44bfd2, #6cd4e8, #2e8b9e, #44bfd2, #6cd4e8);
        background-size: 400% 400%;
        animation: gradientShift 20s ease infinite;
        z-index: -2;
      }

      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: -1;
      }

      .header {
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-bottom: 1px solid rgba(68, 191, 210, 0.2);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-content {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        color: #6cd4e8;
        font-size: 1.8rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .back-btn {
        background: rgba(68, 191, 210, 0.2);
        border: 1px solid rgba(68, 191, 210, 0.3);
        padding: 10px 20px;
        border-radius: 8px;
        color: #6cd4e8;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        text-decoration: none;
      }

      .back-btn:hover {
        background: rgba(68, 191, 210, 0.3);
        box-shadow: 0 0 15px rgba(68, 191, 210, 0.3);
      }

      .container {
        max-width: 600px;
        margin: 60px auto;
        padding: 20px;
      }

      .password-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(68, 191, 210, 0.3);
        border-radius: 20px;
        padding: 40px;
      }

      .card-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .card-header h2 {
        color: #44bfd2;
        font-size: 1.8rem;
        margin-bottom: 10px;
      }

      .card-header p {
        color: #d1d5db;
        font-size: 0.95rem;
      }

      .form-group {
        margin-bottom: 25px;
        position: relative;
      }

      .form-group label {
        display: block;
        color: #44bfd2;
        margin-bottom: 8px;
        font-weight: 500;
      }

      .password-input-wrapper {
        position: relative;
      }

      .form-group input {
        width: 100%;
        padding: 12px 45px 12px 15px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(68, 191, 210, 0.3);
        border-radius: 8px;
        color: #e5e7eb;
        font-family: "Inter", sans-serif;
        transition: all 0.3s ease;
      }

      .form-group input:focus {
        outline: none;
        border-color: #44bfd2;
        background: rgba(255, 255, 255, 0.15);
      }

      .toggle-password {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #6cd4e8;
        cursor: pointer;
        font-size: 1.2rem;
      }

      .password-strength {
        margin-top: 10px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }

      .password-strength-bar {
        height: 100%;
        width: 0%;
        transition: all 0.3s ease;
        border-radius: 2px;
      }

      .password-strength-bar.weak {
        width: 33%;
        background: #ef4444;
      }

      .password-strength-bar.medium {
        width: 66%;
        background: #f59e0b;
      }

      .password-strength-bar.strong {
        width: 100%;
        background: #10b981;
      }

      .password-requirements {
        margin-top: 10px;
        padding: 15px;
        background: rgba(68, 191, 210, 0.1);
        border-radius: 8px;
        font-size: 0.85rem;
      }

      .requirement {
        color: #d1d5db;
        margin-bottom: 5px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .requirement.met {
        color: #10b981;
      }

      .requirement.met::before {
        content: "✓";
      }

      .requirement:not(.met)::before {
        content: "○";
      }

      .error-message {
        color: #ef4444;
        font-size: 0.85rem;
        margin-top: 5px;
        display: none;
      }

      .error-message.show {
        display: block;
      }

      .submit-btn {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #44bfd2, #6cd4e8);
        color: #1a1a2e;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      .submit-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(68, 191, 210, 0.4);
      }

      .submit-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .success-message {
        background: rgba(16, 185, 129, 0.2);
        border: 1px solid rgba(16, 185, 129, 0.3);
        color: #10b981;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }

      .success-message.show {
        display: block;
      }

      @media (max-width: 768px) {
        .container {
          margin: 30px auto;
        }

        .password-card {
          padding: 25px;
        }

        .header h1 {
          font-size: 1.3rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="animated-gradient"></div>
    <div class="overlay"></div>

    <div class="header">
      <div class="header-content">
        <h1>🔒 Change Password</h1>
        <a href="dashboard-new.html" class="back-btn">← Back</a>
      </div>
    </div>

    <div class="container">
      <div class="password-card">
        <div class="card-header">
          <h2>Update Your Password</h2>
          <p>Choose a strong password to keep your account secure</p>
        </div>

        <div class="success-message" id="successMessage">
          Password changed successfully! Redirecting...
        </div>

        <form id="changePasswordForm">
          <div class="form-group">
            <label for="currentPassword">Current Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="currentPassword" required>
              <button type="button" class="toggle-password" onclick="togglePassword('currentPassword')">👁️</button>
            </div>
            <div class="error-message" id="currentPasswordError"></div>
          </div>

          <div class="form-group">
            <label for="newPassword">New Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="newPassword" required>
              <button type="button" class="toggle-password" onclick="togglePassword('newPassword')">👁️</button>
            </div>
            <div class="password-strength">
              <div class="password-strength-bar" id="strengthBar"></div>
            </div>
            <div class="password-requirements">
              <div class="requirement" id="req-length">At least 8 characters</div>
              <div class="requirement" id="req-uppercase">One uppercase letter</div>
              <div class="requirement" id="req-lowercase">One lowercase letter</div>
              <div class="requirement" id="req-number">One number</div>
              <div class="requirement" id="req-special">One special character</div>
            </div>
            <div class="error-message" id="newPasswordError"></div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="confirmPassword" required>
              <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</button>
            </div>
            <div class="error-message" id="confirmPasswordError"></div>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">Change Password</button>
        </form>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api-service.js"></script>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        if (!localStorage.getItem('authToken')) {
          window.location.href = 'login.html';
          return;
        }
      });

      function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        field.type = field.type === 'password' ? 'text' : 'password';
      }

      const newPasswordInput = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');

      newPasswordInput.addEventListener('input', () => {
        checkPasswordStrength(newPasswordInput.value);
        validatePassword();
      });

      confirmPasswordInput.addEventListener('input', validatePassword);

      function checkPasswordStrength(password) {
        const requirements = {
          length: password.length >= 8,
          uppercase: /[A-Z]/.test(password),
          lowercase: /[a-z]/.test(password),
          number: /[0-9]/.test(password),
          special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
        };

        document.getElementById('req-length').classList.toggle('met', requirements.length);
        document.getElementById('req-uppercase').classList.toggle('met', requirements.uppercase);
        document.getElementById('req-lowercase').classList.toggle('met', requirements.lowercase);
        document.getElementById('req-number').classList.toggle('met', requirements.number);
        document.getElementById('req-special').classList.toggle('met', requirements.special);

        const metCount = Object.values(requirements).filter(Boolean).length;
        const strengthBar = document.getElementById('strengthBar');

        strengthBar.className = 'password-strength-bar';
        if (metCount <= 2) {
          strengthBar.classList.add('weak');
        } else if (metCount <= 4) {
          strengthBar.classList.add('medium');
        } else {
          strengthBar.classList.add('strong');
        }

        return Object.values(requirements).every(Boolean);
      }

      function validatePassword() {
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        const newPasswordError = document.getElementById('newPasswordError');
        const confirmPasswordError = document.getElementById('confirmPasswordError');

        newPasswordError.classList.remove('show');
        confirmPasswordError.classList.remove('show');

        if (newPassword && !checkPasswordStrength(newPassword)) {
          newPasswordError.textContent = 'Password does not meet requirements';
          newPasswordError.classList.add('show');
          return false;
        }

        if (confirmPassword && newPassword !== confirmPassword) {
          confirmPasswordError.textContent = 'Passwords do not match';
          confirmPasswordError.classList.add('show');
          return false;
        }

        return true;
      }

      document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        document.getElementById('currentPasswordError').classList.remove('show');

        if (!checkPasswordStrength(newPassword)) {
          document.getElementById('newPasswordError').textContent = 'Password does not meet requirements';
          document.getElementById('newPasswordError').classList.add('show');
          return;
        }

        if (newPassword !== confirmPassword) {
          document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
          document.getElementById('confirmPasswordError').classList.add('show');
          return;
        }

        if (currentPassword === newPassword) {
          document.getElementById('newPasswordError').textContent = 'New password must be different from current password';
          document.getElementById('newPasswordError').classList.add('show');
          return;
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Changing Password...';

        try {
          const response = await ApiService.post('/user/change-password', {
            current_password: currentPassword,
            new_password: newPassword,
            new_password_confirmation: confirmPassword
          });

          document.getElementById('successMessage').classList.add('show');
          document.getElementById('changePasswordForm').reset();

          setTimeout(() => {
            window.location.href = 'user-settings.html';
          }, 2000);

        } catch (error) {
          console.error('Error changing password:', error);

          if (error.message.includes('current password')) {
            document.getElementById('currentPasswordError').textContent = 'Current password is incorrect';
            document.getElementById('currentPasswordError').classList.add('show');
          } else {
            alert('Failed to change password. Please try again.');
          }

          submitBtn.disabled = false;
          submitBtn.textContent = 'Change Password';
        }
      });
    </script>
  </body>
</html>
