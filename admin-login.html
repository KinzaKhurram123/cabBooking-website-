<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - RideLynk</title>
    <link rel="icon" href="images/icc.png" type="image/gif" sizes="16x16" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .login-container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        max-width: 450px;
        width: 100%;
      }

      .login-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 40px;
        text-align: center;
        color: white;
      }

      .logo {
        font-size: 3rem;
        margin-bottom: 10px;
      }

      .login-title {
        font-size: 1.8rem;
        font-weight: 800;
        margin-bottom: 5px;
      }

      .login-subtitle {
        font-size: 0.95rem;
        opacity: 0.9;
      }

      .login-form {
        padding: 40px;
      }

      .form-group {
        margin-bottom: 25px;
      }

      .form-label {
        display: block;
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
        font-size: 0.95rem;
      }

      .form-input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 1rem;
        font-family: "Inter", sans-serif;
        transition: all 0.3s ease;
      }

      .form-input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
      }

      .password-wrapper {
        position: relative;
      }

      .toggle-password {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.2rem;
        color: #999;
      }

      .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .remember-me input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .remember-me label {
        cursor: pointer;
        font-size: 0.9rem;
        color: #666;
      }

      .forgot-link {
        color: #667eea;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
      }

      .forgot-link:hover {
        text-decoration: underline;
      }

      .login-btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-weight: 700;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .login-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      .login-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .divider {
        text-align: center;
        margin: 25px 0;
        position: relative;
      }

      .divider::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: #e0e0e0;
      }

      .divider-text {
        background: white;
        padding: 0 15px;
        color: #999;
        font-size: 0.9rem;
        position: relative;
      }

      .back-link {
        text-align: center;
        margin-top: 20px;
      }

      .back-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
      }

      .back-link a:hover {
        text-decoration: underline;
      }

      .error-message {
        background: #fee;
        color: #c33;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 0.9rem;
        display: none;
      }

      @media (max-width: 480px) {
        .login-header {
          padding: 30px 20px;
        }

        .login-form {
          padding: 30px 20px;
        }

        .login-title {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <div class="logo">🔐</div>
        <h1 class="login-title">Admin Portal</h1>
        <p class="login-subtitle">RideLynk Management System</p>
      </div>

      <div class="login-form">
        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              class="form-input"
              id="email"
              placeholder="superadmin@gmail.com"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                class="form-input"
                id="password"
                placeholder="Enter your password"
                required
              />
              <button type="button" class="toggle-password" id="togglePassword">
                👁️
              </button>
            </div>
          </div>

          <!-- Test Credentials Helper -->
          <div style="background: #f0f9ff; border: 1px solid #bae6fd; padding: 12px; border-radius: 8px; margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <div style="font-size: 0.85rem; color: #0369a1;">
                <strong>Test Credentials:</strong><br>
                <span style="font-size: 0.8rem;">superadmin@gmail.com / 12345678</span>
              </div>
              <button type="button" onclick="fillTestCredentials()" style="background: #0ea5e9; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600;">
                Use Test Login
              </button>
            </div>
          </div>

          <div class="remember-forgot">
            <div class="remember-me">
              <input type="checkbox" id="rememberMe" />
              <label for="rememberMe">Remember me</label>
            </div>
            <a href="forgot-password.html" class="forgot-link"
              >Forgot Password?</a
            >
          </div>

          <button type="submit" class="login-btn" id="loginBtn">
            Sign In to Admin Panel
          </button>
        </form>

        <div class="divider">
          <span class="divider-text">OR</span>
        </div>

        <div class="back-link">
          <a href="login.html">← Back to User Login</a>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/auth-service.js"></script>

    <script>
      // Fill test credentials
      function fillTestCredentials() {
        document.getElementById('email').value = 'superadmin@gmail.com';
        document.getElementById('password').value = '12345678';

        // Show visual feedback
        const btn = event.target;
        const originalText = btn.textContent;
        btn.textContent = '✓ Filled!';
        btn.style.background = '#10b981';

        setTimeout(() => {
          btn.textContent = originalText;
          btn.style.background = '#0ea5e9';
        }, 1500);
      }

      // Toggle password visibility
      document.getElementById('togglePassword').addEventListener('click', function() {
        const passwordInput = document.getElementById('password');
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.textContent = type === 'password' ? '👁️' : '🙈';
      });

      // Check if already logged in
      window.addEventListener("DOMContentLoaded", () => {
        const authToken = localStorage.getItem(CONFIG.STORAGE_KEYS.AUTH_TOKEN);
        const userRole = localStorage.getItem(CONFIG.STORAGE_KEYS.USER_ROLE);

        console.log('Admin Login Page - Checking existing session...');
        console.log('Token exists:', !!authToken);
        console.log('User role:', userRole);

        if (authToken && userRole === "admin") {
          // Already logged in as admin, redirect to admin dashboard
          console.log('Already logged in as admin, redirecting to dashboard...');
          window.location.href = "admin-dashboard.html";
        }
      });

      // Handle admin login form submission
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('rememberMe').checked;
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');

        // Hide previous errors
        errorMessage.style.display = 'none';

        // Validate inputs
        if (!email || !password) {
          errorMessage.textContent = 'Please enter both email and password';
          errorMessage.style.display = 'block';
          return;
        }

        // Disable button and show loading
        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing In...';

        try {
          console.log('=== ADMIN LOGIN ATTEMPT ===');
          console.log('Email:', email);

          // Call login API using AuthService (with role normalization)
          const response = await AuthService.login({
            email: email,
            password: password
          });

          console.log('Admin Login - API Response:', response);

          // Check if login was successful
          const hasToken = response.token || response.data?.token;

          if (hasToken) {
            console.log('Admin login successful, token found');

            // Store remember me preference
            if (rememberMe) {
              localStorage.setItem(CONFIG.STORAGE_KEYS.REMEMBER_ME, 'true');
            }

            // Wait a bit to ensure localStorage is written
            await new Promise(resolve => setTimeout(resolve, 300));

            // Get user role from localStorage
            const userRole = localStorage.getItem(CONFIG.STORAGE_KEYS.USER_ROLE);

            console.log('=== ADMIN LOGIN DEBUG ===');
            console.log('Stored Token:', localStorage.getItem(CONFIG.STORAGE_KEYS.AUTH_TOKEN));
            console.log('Stored Role:', userRole);
            console.log('Stored User Data:', localStorage.getItem(CONFIG.STORAGE_KEYS.USER_DATA));
            console.log('Is Admin?', userRole === 'admin');
            console.log('========================');

            // Verify user is admin
            if (userRole !== 'admin') {
              throw new Error('Access denied. Only administrators can access this portal. Your role: ' + (userRole || 'none'));
            }

            console.log('Admin verification passed, redirecting to dashboard...');

            // Redirect to admin dashboard immediately
            window.location.href = 'admin-dashboard.html';
          } else {
            throw new Error(response.message || 'Invalid email or password');
          }
        } catch (error) {
          console.error('Admin login error:', error);

          // Show error message
          errorMessage.textContent = error.message || 'Login failed. Please check your credentials and try again.';
          errorMessage.style.display = 'block';

          // Re-enable button
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign In to Admin Panel';
        }
      });
    </script>
  </body>
</html>
